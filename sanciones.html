<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanciones - Colombia Reals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        // PROTECCIÓN
        window.addEventListener('load', () => {
            if(!localStorage.getItem('nombreIC')) {
                window.location.replace('login.html');
            }
        });

    <style>

        .contenedor{max-width:900px;margin:0 auto;}
        .volver{display:inline-flex;align-items:center;gap:8px;color:#93C5FD;text-decoration:none;margin-bottom:25px;font-weight:bold;}
        .volver:hover{color:#F5C518;}
        h1{color:#F5C518;margin-bottom:30px;text-align:center;}
        .seccion{background:rgba(17,24,39,0.9);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #374151;}

<body>

        <div id="ban" class="seccion">

        </div>
    </div>

</html>
