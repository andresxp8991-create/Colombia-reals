<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Colombia Reals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dorado: '#F5C518', azul: '#2563EB', rojo: '#CE1126', discord: '#5865F2' }
                }
            }
        }
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Segoe UI,sans-serif;color:white;display:none;}
        .seccion{min-height:100vh;background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),url('https://cdn.discordapp.com/attachments/1515011245538021390/1522656555760357386/file_000000007e0071f58a8cf07bc6c63599.png?ex=6a4943ec&is=6a47f26c&hm=5ef321e63c7e586e0882001e715a58ecb5b8c54c183268663648a1bb284b824d&') center/cover no-repeat fixed;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;padding-top:90px;}
        @keyframes flotar{0%{transform:translateY(0);}50%{transform:translateY(-12px);}100%{transform:translateY(0);}}
        .logo{max-width:420px;width:90%;margin-bottom:25px;border-radius:12px;animation:flotar 4.5s infinite ease-in-out;filter:drop-shadow(0 0 25px rgba(245,197,24,0.5));}
        .barra{position:fixed;top:15px;right:15px;z-index:999;}
        .usuario{display:flex;align-items:center;gap:8px;background:rgba(37,99,235,0.2);border:2px solid #2563EB;padding:8px 16px;border-radius:20px;font-weight:bold;color:#93C5FD;}
        .cerrar{background:none;border:none;color:#ff6b6b;font-size:18px;cursor:pointer;}
        .titulo{font-size:36px;margin-bottom:12px;}
        .sub{font-size:17px;color:#ddd;margin-bottom:35px;}
        .botones{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-bottom:40px;}
        .btn{padding:14px 24px;border:none;border-radius:10px;font-size:16px;font-weight:bold;color:white;text-decoration:none;display:flex;align-items:center;gap:8px;transition:0.3s;}
        .btn:hover{transform:translateY(-3px);}
        .btn-discord{background:#5865F2;}
        .btn-ip{background:#F5C518;color:black;}
        .btn-sanciones{background:#CE1126;}
        .cat{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;max-width:750px;width:100%;}
        .btn-cat{padding:14px;background:rgba(26,26,26,0.7);border:2px solid #444;border-radius:8px;color:white;font-weight:600;text-decoration:none;transition:0.3s;}
        .btn-cat:hover{border-color:#F5C518;}
        .aviso{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:#10B981;color:black;padding:12px 22px;border-radius:8px;font-weight:bold;opacity:0;transition:0.3s;}
        .aviso.ver{opacity:1;}
    </style>
</head>
<body>
    <div class="barra"><div id="zona"></div></div>
    <section class="seccion">
        <img src="https://cdn.discordapp.com/attachments/1488264409825542277/1516009727480561836/Picsart_26-05-25_17-31-56-817.png?ex=6a48d095&is=6a477f15&hm=e1b8c2549fe60a5e07b7b9cc51c57123de59401e39c80af75db1155d99ddc11e&" alt="Colombia Reals" class="logo">
        <h1 class="titulo">COLOMBIA REALS ROLEPLAY</h1>
        <p class="sub">Servidor 100% colombiano de SA-MP</p>
        <div class="botones">
            <a href="https://discord.gg/REsXTSrvCa" target="_blank" class="btn btn-discord"><i class="fa fa-discord"></i> DISCORD</a>
            <button onclick="copiarIP()" class="btn btn-ip"><i class="fa fa-copy"></i> COPIAR IP</button>
            <a href="sanciones.html" class="btn btn-sanciones"><i class="fa fa-exclamation-triangle"></i> SANCIONES</a>
        </div>
        <div class="cat">
            <a href="informacion.html" class="btn-cat">¿POR QUÉ ELEGIRNOS?</a>
            <a href="discords.html" class="btn-cat">DISCORDS OFICIALES</a>
            <a href="sanciones.html#rol" class="btn-cat">SANCIONES DE ROL</a>
            <a href="sanciones.html#ban" class="btn-cat">BAN PERMANENTE</a>
        </div>
    </section>
    <div id="aviso" class="aviso">✅ IP copiada!</div>

    <script>
        // PROTECCIÓN OBLIGATORIA
        window.addEventListener('load', () => {
            const nombre = localStorage.getItem('nombreIC');
            if(!nombre) { window.location.replace('login.html'); return; }
            document.body.style.display = 'block';
            document.getElementById('zona').innerHTML = `<div class="usuario"><i class="fa fa-user-circle"></i> ${nombre} <button onclick="cerrar()" class="cerrar">✕</button></div>`;
        });
        function cerrar() { localStorage.clear(); window.location.replace('login.html'); }
        function copiarIP() {
            navigator.clipboard.writeText("172.83.152.206:9999").then(() => {
                const a = document.getElementById('aviso'); a.classList.add('ver'); setTimeout(()=>a.classList.remove('ver'),2500);
            });
        }
    </script>
</body>
</html>
