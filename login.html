<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Colombia Reals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dorado: '#F5C518',
                        boton-login: '#2563EB', /* COLOR AZUL QUE PEDISTE */
                        fondo-form: '#111827',
                        input: '#1F2937'
                    },
                    fontFamily: { sans: ['Segoe UI', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                        url('https://cdn.discordapp.com/attachments/1515011245538021390/1522656555760357386/file_000000007e0071f58a8cf07bc6c63599.png?ex=6a4943ec&is=6a47f26c&hm=5ef321e63c7e586e0882001e715a58ecb5b8c54c183268663648a1bb284b824d&') center/cover no-repeat fixed;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; color: white; padding: 20px;
        }

        .contenedor-form {
            background: #111827; border: 1px solid #374151; border-radius: 16px;
            padding: 40px 30px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .logo-form {
            display: block; max-width: 120px; margin: 0 auto 20px; border-radius: 8px;
        }

        .titulo-form { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 30px; color: #F5C518; }

        .grupo-input { margin-bottom: 20px; }
        .grupo-input label { display: block; margin-bottom: 8px; font-weight: 600; color: #D1D5DB; }
        .grupo-input input {
            width: 100%; padding: 12px 15px; background: #1F2937; border: 1px solid #4B5563;
            border-radius: 8px; color: white; font-size: 15px; transition: 0.3s;
        }
        .grupo-input input:focus { outline: none; border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        .btn-ingresar {
            width: 100%; padding: 14px; background: #2563EB; border: none; border-radius: 8px;
            color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }
        .btn-ingresar:hover { background: #1D4ED8; transform: translateY(-2px); }

        .btn-volver {
            display: block; text-align: center; margin-top: 25px; color: #9CA3AF;
            text-decoration: none; font-weight: 600; transition: 0.3s;
        }
        .btn-volver:hover { color: #F5C518; }

        .mensaje { text-align: center; margin-top: 15px; font-size: 14px; }
        .error { color: #F87171; }
        .exito { color: #10B981; }
    </style>
</head>
<body>
    <div class="contenedor-form">
        <!-- TU LOGO EN EL FORMULARIO -->
        <img src="https://cdn.discordapp.com/attachments/1488264409825542277/1516009727480561836/Picsart_26-05-25_17-31-56-817.png?ex=6a48d095&is=6a477f15&hm=e1b8c2549fe60a5e07b7b9cc51c57123de59401e39c80af75db1155d99ddc11e&" alt="Colombia Reals" class="logo-form">
        
        <h2 class="titulo-form">INICIAR SESIÓN</h2>

        <form id="form-login">
            <div class="grupo-input">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="tu@correo.com" required>
            </div>

            <div class="grupo-input">
                <label for="nombreIC">Nombre IC</label>
                <input type="text" id="nombreIC" placeholder="Tu nombre en el juego" required>
            </div>

            <div class="grupo-input">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-ingresar">INGRESAR <i class="fa fa-arrow-right ml-2"></i></button>
        </form>

        <div id="mensaje" class="mensaje"></div>

        <a href="index.html" class="btn-volver"><i class="fa fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
        const form = document.getElementById('form-login');
        const mensaje = document.getElementById('mensaje');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const correo = document.getElementById('correo').value;
            const nombreIC = document.getElementById('nombreIC').value;
            const contraseña = document.getElementById('contraseña').value;

            // GUARDA LOS DATOS PARA QUE NO SE PIERDAN
            localStorage.setItem('correo', correo);
            localStorage.setItem('nombreIC', nombreIC);
            localStorage.setItem('contraseña', contraseña);

            mensaje.innerHTML = '<span class="exito">✅ ¡Bienvenido ' + nombreIC + '! Redirigiendo...</span>';
            
            // Te lleva al inicio después de 2 segundos
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });
    </script>
</body>
</html>
