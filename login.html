<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Colombia Reals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),
            url('https://cdn.discordapp.com/attachments/1515011245538021390/1522656555760357386/file_000000007e0071f58a8cf07bc6c63599.png?ex=6a4943ec&is=6a47f26c&hm=5ef321e63c7e586e0882001e715a58ecb5b8c54c183268663648a1bb284b824d&') center/cover no-repeat fixed;
            font-family:Segoe UI,sans-serif;
            color:white;
            display:flex;align-items:center;justify-content:center;
            padding:20px;
        }
        .form{
            background:#111827;
            border:1px solid #374151;
            border-radius:16px;
            padding:35px 25px;
            width:100%;max-width:400px;
            text-align:center;
        }
        .logo{max-width:110px;margin:0 auto 20px;border-radius:8px;}
        h2{color:#F5C518;margin-bottom:25px;}
        .campo{margin-bottom:18px;text-align:left;}
        label{display:block;margin-bottom:7px;color:#D1D5DB;}
        input{
            width:100%;padding:12px 15px;
            background:#1F2937;border:1px solid #4B5563;
            border-radius:8px;color:white;font-size:15px;
        }
        input:focus{outline:none;border-color:#2563EB;}
        .btn-entrar{
            width:100%;padding:14px;
            background:#2563EB;border:none;border-radius:8px;
            color:white;font-size:16px;font-weight:bold;cursor:pointer;
            margin-top:5px;
        }
        .btn-entrar:hover{background:#1D4ED8;}
        .volver{display:block;margin-top:25px;color:#9CA3AF;text-decoration:none;}
        .volver:hover{color:#F5C518;}
    </style>
</head>
<body>
    <div class="form">
        <img src="https://cdn.discordapp.com/attachments/1488264409825542277/1516009727480561836/Picsart_26-05-25_17-31-56-817.png?ex=6a48d095&is=6a477f15&hm=e1b8c2549fe60a5e07b7b9cc51c57123de59401e39c80af75db1155d99ddc11e&" alt="Colombia Reals" class="logo">
        <h2>INICIAR SESIÓN</h2>
        <form id="miForm">
            <div class="campo">
                <label>Correo electrónico</label>
                <input type="email" id="correo" required>
            </div>
            <div class="campo">
                <label>Nombre IC</label>
                <input type="text" id="nombreIC" required>
            </div>
            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="pass" required>
            </div>
            <button type="submit" class="btn-entrar">ENTRAR</button>
        </form>
        <a href="index.html" class="volver"><i class="fa fa-arrow-left"></i> Volver al inicio</a>
    </div>
    <script>
        document.getElementById('miForm').addEventListener('submit', e=>{
            e.preventDefault();
            localStorage.setItem('correo',document.getElementById('correo').value);
            localStorage.setItem('nombreIC',document.getElementById('nombreIC').value);
            localStorage.setItem('contraseña',document.getElementById('pass').value);
            alert('✅ Bienvenido '+document.getElementById('nombreIC').value);
            window.location.href='index.html';
        });
    </script>
</body>
</html>
