<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Colombia Reals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
                        url('https://cdn.discordapp.com/attachments/1515011245538021390/1522656555760357386/file_000000007e0071f58a8cf07bc6c63599.png?ex=6a4943ec&is=6a47f26c&hm=5ef321e63c7e586e0882001e715a58ecb5b8c54c183268663648a1bb284b824d&') center/cover no-repeat fixed;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; color: white; padding: 20px;
        }

        .formulario {
            background: #111827; border: 1px solid #374151; border-radius: 16px;
            padding: 35px 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 35px rgba(0,0,0,0.5);
        }

        .logo-form {
            display: block; max-width: 110px; margin: 0 auto 20px; border-radius: 8px;
        }

        .titulo { text-align: center; font-size: 22px; font-weight: 800; margin-bottom: 25px; color: #F5C518; }

        .campo { margin-bottom: 18px; }
        .campo label { display: block; margin-bottom: 7px; font-weight: 600; color: #D1D5DB; font-size: 15px; }
        .campo input {
            width: 100%; padding: 12px 15px; background: #1F2937; border: 1px solid #4B5563;
            border-radius: 8px; color: white; font-size: 15px; transition: 0.3s;
        }
        .campo input:focus { outline: none; border-color: #2563EB; }

        .btn-ingresar {
            width: 100%; padding: 14px; background: #2563EB; border: none; border-radius: 8px;
            color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 5px;
        }
        .btn-ingresar:hover { background: #1D4ED8; }

        .enlace-volver {
            display: block; text-align: center; margin-top: 25px; color: #9CA3AF;
            text-decoration: none; font-weight: 600; transition: 0.3s; font-size: 14px;
        }
        .enlace-volver:hover { color: #F5C518; }

        .mensaje { text-align: center; margin-top: 15px; font-size: 14px; color: #10B981; }
    </style>
</head>
<body>
    <div class="formulario">
        <img src="https://cdn.discordapp.com/attachments/1488264409825542277/1516009727480561836/Picsart_26-05-25_17-31-56-817.png?ex=6a48d095&is=6a477f15&hm=e1b8c2549fe60a5e07b7b9cc51c57123de59401e39c80af75db1155d99ddc11e&" alt="Colombia Reals" class="logo-form">
        
        <h2 class="titulo">INICIAR SESIÓN</h2>

        <form id="formLogin">
            <div class="campo">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="tu@correo.com" required>
            </div>

            <div class="campo">
                <label for="nombreIC">Nombre IC (del juego)</label>
                <input type="text" id="nombreIC" placeholder="Ej: Juan_Pérez" required>
            </div>

            <div class="campo">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-ingresar">ENTRAR <i class="fa fa-arrow-right ml-1"></i></button>
        </form>

        <div id="mensaje" class="mensaje"></div>

        <a href="index.html" class="enlace-volver"><i class="fa fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
        const form = document.getElementById('formLogin');
        const mensaje = document.getElementById('mensaje');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // GUARDAMOS LOS DATOS
            localStorage.setItem('correo', document.getElementById('correo').value);
            localStorage.setItem('nombreIC', document.getElementById('nombreIC').value);
            localStorage.setItem('contraseña', document.getElementById('contraseña').value);

            mensaje.textContent = `✅ ¡Bienvenido ${document.getElementById('nombreIC').value}!`;
            
            // LLEVAMOS AL INICIO EN 2 SEGUNDOS
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });
    </script>
</body>
</html>
