<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Colombia Reals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{min-height:100vh;background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),url('https://cdn.discordapp.com/attachments/1515011245538021390/1522667848269299782/file_000000007e0071f58a8cf07bc6c63599.png?ex=6a494e70&is=6a47fcf0&hm=27abdc961f5bdd428d1a88eef0c8a5adbb461fb600c2933deba79be7762bde44&') center/cover no-repeat fixed;font-family:Segoe UI,sans-serif;color:white;display:flex;align-items:center;justify-content:center;padding:20px;}
        .logo-flotante{position:fixed;top:15px;left:15px;z-index:999;animation:flotar-logo 4s infinite ease-in-out;}
        .logo-flotante img{width:65px;border-radius:8px;}
        @keyframes flotar-logo{0%{transform:translateY(0);}50%{transform:translateY(-8px);}100%{transform:translateY(0);}}
        .form{background:#111827;border:1px solid #374151;border-radius:16px;padding:35px 25px;width:100%;max-width:400px;text-align:center;}
        .logo{max-width:110px;margin:0 auto 20px;border-radius:8px;animation:flotar-logo 4s infinite ease-in-out;}
        h2{color:#F5C518;margin-bottom:25px;}
        .campo{margin-bottom:18px;text-align:left;}
        label{display:block;margin-bottom:7px;color:#D1D5DB;}
        input{width:100%;padding:12px 15px;background:#1F2937;border:1px solid #4B5563;border-radius:8px;color:white;font-size:15px;}
        input:focus{outline:none;border-color:#2563EB;}
        .btn{width:100%;padding:14px;background:#2563EB;border:none;border-radius:8px;color:white;font-size:16px;font-weight:bold;cursor:pointer;}
        .btn:hover{background:#1D4ED8;}
        .msg{margin-top:15px;color:#10B981;}
    </style>
</head>
<body>
    <div class="logo-flotante">
        <img src="https://cdn.discordapp.com/attachments/1488264409825542277/1516009727480561836/Picsart_26-05-25_17-31-56-817.png?ex=6a48d095&is=6a477f15&hm=e1b8c2549fe60a5e07b7b9cc51c57123de59401e39c80af75db1155d99ddc11e&" alt="Colombia Reals">
    </div>
    <div class="form">
        <img src="https://cdn.discordapp.com/attachments/1488264409825542277/1516009727480561836/Picsart_26-05-25_17-31-56-817.png?ex=6a48d095&is=6a477f15&hm=e1b8c2549fe60a5e07b7b9cc51c57123de59401e39c80af75db1155d99ddc11e&" alt="Colombia Reals" class="logo">
        <h2>INICIAR SESIÓN</h2>
        <form id="f">
            <div class="campo"><label>Correo electrónico</label><input type="email" id="cor" required></div>
            <div class="campo"><label>Nombre IC</label><input type="text" id="nic" required></div>
            <div class="campo"><label>Contraseña</label><input type="password" id="pas" required></div>
            <button type="submit" class="btn">INGRESAR</button>
        </form>
        <div id="m" class="msg"></div>
    </div>

    <script>
        if(localStorage.getItem('nombreIC')) window.location.replace('index.html');
        document.getElementById('f').addEventListener('submit', e=>{
            e.preventDefault();
            localStorage.setItem('correo',document.getElementById('cor').value);
            localStorage.setItem('nombreIC',document.getElementById('nic').value);
            localStorage.setItem('contraseña',document.getElementById('pas').value);
            document.getElementById('m').textContent='✅ Bienvenido! Cargando...';
            setTimeout(()=>window.location.replace('index.html'),1500);
        });
    </script>

    <!-- REPRODUCTOR CON CONTINUIDAD -->
    <div style="position:fixed;bottom:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden;z-index:-1;">
        <iframe id="musica" width="1" height="1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <script>
        const canciones = [
            "https://www.youtube.com/embed/qrTz4OEMk_0?si=8RyOx-PKC4GOfQV7&autoplay=1&mute=0&loop=0&playlist=qrTz4OEMk_0",
            "https://www.youtube.com/embed/h269QbGCvPs?si=YupAsbabxcT1aI1t&autoplay=1&mute=0&loop=0&playlist=h269QbGCvPs",
            "https://www.youtube.com/embed/7bQcByZicWw?si=px82ifDxXfADJSgY&autoplay=1&mute=0&loop=0&playlist=7bQcByZicWw",
            "https://www.youtube.com/embed/siFCXKOQoXI?si=ysiJvczcHK9OUwV8&autoplay=1&mute=0&loop=0&playlist=siFCXKOQoXI",
            "https://www.youtube.com/embed/0iklBbU6FXI?si=TveBCZOO_BoggBcr&autoplay=1&mute=0&loop=0&playlist=0iklBbU6FXI",
            "https://www.youtube.com/embed/IT5RmPy0Tf4?si=UePtmHhUPDIsV41X&autoplay=1&mute=0&loop=0&playlist=IT5RmPy0Tf4",
            "https://www.youtube.com/embed/aQnsbFtUHG4?si=lFOO4lpLyopQb2Jg&autoplay=1&mute=0&loop=0&playlist=aQnsbFtUHG4",
            "https://www.youtube.com/embed/ZFww08Dc4ws?si=DpZqpgNd3opY5qZW&autoplay=1&mute=0&loop=0&playlist=ZFww08Dc4ws",
            "https://www.youtube.com/embed/zkqfSHb1A_k?si=JPPK_tAlL2rkaTYM&autoplay=1&mute=0&loop=0&playlist=zkqfSHb1A_k",
            "https://www.youtube.com/embed/ekFwDO6xOn0?si=N_eJzawQ-3NEPPTU&autoplay=1&mute=0&loop=0&playlist=ekFwDO6xOn0",
            "https://www.youtube.com/embed/mzBg_Ln8j2U?si=prFIf4poOEkX-1VP&autoplay=1&mute=0&loop=0&playlist=mzBg_Ln8j2U",
            "https://www.youtube.com/embed/NVLgkXylEuQ?si=jFhgSpbffXkpqbwu&autoplay=1&mute=0&loop=0&playlist=NVLgkXylEuQ",
            "https://www.youtube.com/embed/TqsETF0P_Dw?si=6UP2kqBN7IHwMN-g&autoplay=1&mute=0&loop=0&playlist=TqsETF0P_Dw"
        ];
        let indiceActual = parseInt(localStorage.getItem('indiceCancion') || Math.floor(Math.random() * canciones.length));
        document.getElementById('musica').src = canciones[indiceActual];
        localStorage.setItem('indiceCancion', indiceActual);
        setInterval(() => {
            indiceActual = (indiceActual + 1) % canciones.length;
            localStorage.setItem('indiceCancion', indiceActual);
            document.getElementById('musica').src = canciones[indiceActual];
        }, 180000);
    </script>
</body>
</html>
