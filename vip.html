    <script>
        // MÚSICA SIN FALLOS
        const musica = document.getElementById('musicaFondo');
        const iconoMusica = document.getElementById('iconoMusica');
        let musicaActiva = true;
        function controlarMusica(){
            if(musicaActiva){ musica.pause(); iconoMusica.className = "fa fa-volume-off"; }
            else{ musica.play().catch(()=>{}); iconoMusica.className = "fa fa-volume-up"; }
            musicaActiva = !musicaActiva;
        }
        document.addEventListener('click', () => { if(musicaActiva) musica.play().catch(()=>{}); }, {once:true});

        // TUS DATOS EXACTOS
        const datosBancos = {
            paypal: {titulo:"PAYPAL", info:`<p><strong>Correo:</strong> khasxmvp@gmail.com</p><p>Envía como bienes y servicios.</p>`, valor:"khasxmvp@gmail.com"},
            nequi: {titulo:"NEQUI", info:`<p><strong>Número:</strong> 315 3830124</p><p>Copia el número, abre Nequi manualmente y pégalo.</p>`, valor:"3153830124"},
            daviplata: {titulo:"DAVIPLATA", info:`<p>Próximamente disponible</p>`, valor:""},
            bancolombia: {titulo:"BANCOLOMBIA", info:`<p>Próximamente disponible</p>`, valor:""}
        };

        function abrirModalPrincipal(nombre,precio){
            document.getElementById('nombreProducto').textContent = "Producto: "+nombre;
            document.getElementById('precioProducto').textContent = precio;
            document.getElementById('modalPrincipal').style.display = "flex";
        }
        function cerrarModalPrincipal(){document.getElementById('modalPrincipal').style.display = "none";}
        function abrirModalBancos(){document.getElementById('modalBancos').style.display = "flex";}
        function cerrarModalBancos(){document.getElementById('modalBancos').style.display = "none";}
        function verDatosBanco(tipo){
            const b = datosBancos[tipo];
            document.getElementById('tituloBanco').textContent = b.titulo;
            document.getElementById('contenidoDatos').innerHTML = b.info;
            const acc = document.getElementById('accionesBanco');
            acc.innerHTML = "";
            document.getElementById('mensajeCopiado').style.display = "none";
            if(b.valor) acc.innerHTML = `<button onclick="copiar('${b.valor}')" class="btn-copiar"><i class="fa fa-copy"></i> COPIAR ${tipo==='paypal'?'CORREO':'NÚMERO'}</button>`;
            cerrarModalBancos();
            document.getElementById('modalDatos').style.display = "flex";
        }
        function cerrarModalDatos(){document.getElementById('modalDatos').style.display = "none";}
        function copiar(texto){
            navigator.clipboard.writeText(texto).then(()=>{
                document.getElementById('mensajeCopiado').style.display = "block";
                setTimeout(()=>document.getElementById('mensajeCopiado').style.display="none",4000);
            });
        }
        window.onclick = e => {
            if(e.target.id==='modalPrincipal')cerrarModalPrincipal();
            if(e.target.id==='modalBancos')cerrarModalBancos();
            if(e.target.id==='modalDatos')cerrarModalDatos();
        }
    </script>
